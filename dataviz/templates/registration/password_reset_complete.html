{% extends "dataviz/base.html" %}

{% block title %}Password Updated | DataViz Pro{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-4">
        <h1 class="h4 fw-bold mb-2">Password updated</h1>
        <p class="text-muted mb-4">Your password has been changed successfully. You can now sign in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-primary">Sign in now</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
