{% extends "dataviz/base.html" %}

{% block title %}Check Your Email | DataViz Pro{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-4">
        <h1 class="h4 fw-bold mb-2">Check your inbox</h1>
        <p class="text-muted mb-4">If an account exists for that email, a password reset link has been sent.</p>
        <a href="{% url 'login' %}" class="btn btn-outline-primary">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
