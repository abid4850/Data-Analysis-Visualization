<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="100%" height="100%" fill="#fff"/>
  <g transform="translate(40,40)">
    <text x="0" y="0" font-size="18" fill="#333">Titanic — Passenger survival by class</text>
    <g transform="translate(0,20)">
      <!-- bars -->
      <rect x="0" y="180" width="80" height="80" fill="#1f77b4"/>
      <rect x="120" y="120" width="80" height="140" fill="#ff7f0e"/>
      <rect x="240" y="60" width="80" height="200" fill="#2ca02c"/>
      <!-- labels -->
      <text x="0" y="275" font-size="12">1st</text>
      <text x="120" y="275" font-size="12">2nd</text>
      <text x="240" y="275" font-size="12">3rd</text>
    </g>
  </g>
</svg>